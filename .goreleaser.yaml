version: 2

project_name: senpaiscanner

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: senpaiscanner
    main: ./cmd/senpaiscanner
    binary: senpaiscanner
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/official-LloydLewis/SenPaiScanner/pkg/version.Version={{.Version}}
      - -X github.com/official-LloydLewis/SenPaiScanner/pkg/version.Commit={{.Commit}}
      - -X github.com/official-LloydLewis/SenPaiScanner/pkg/version.BuildDate={{.Date}}
      - -X github.com/official-LloydLewis/SenPaiScanner/pkg/version.BuiltBy=goreleaser
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: senpaiscanner
    name_template: >-
      {{.ProjectName}}_
      {{- .Os}}_
      {{- if eq .Arch "amd64"}}x86_64
      {{- else if eq .Arch "386"}}i386
      {{- else}}{{.Arch}}{{end}}
      {{- if .Arm}}v{{.Arm}}{{end}}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{incpatch .Version}}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Other
      order: 999

release:
  github:
    owner: matinsenpai
    name: senpaiscanner
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
